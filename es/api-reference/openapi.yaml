openapi: 3.0.3
info:
  title: NPC Builder - API
  description: >
    Esta es la especificación más reciente de la API de NPC Builder que define una API integral y lista para producción para NPC Builder. La API se divide en tres servicios principales:


    **Servicio de Interacciones**  
      - **Propósito:** Permite conversaciones dinámicas y con conciencia de contexto entre jugadores y personajes NPC.


    **Servicio de Contexto**  
      - **Propósito:** Gestiona entidades del juego para construir y mantener entornos inmersivos.
      - **Incluye:**  
        - **Mundos:** Crear, actualizar y eliminar mundos del juego.
        - **Regiones:** Definir y gestionar regiones dentro de un mundo.
        - **Localizaciones:** Gestionar ubicaciones específicas dentro de las regiones.
        - **Personajes:** Gestionar el ciclo de vida (creación, actualización, eliminación) de personajes NPC.


    **Servicio de Sesiones**  
      - **Propósito:** Gestiona sesiones de jugadores para mantener el contexto del juego y rastrear interacciones.


    En conjunto, esta especificación sirve como una guía detallada para aprovechar los servicios de NPC Builder—permitiendo a los desarrolladores crear experiencias ricas e interactivas mientras gestionan de forma eficiente contextos y entidades del juego.
        _Debes ceñirte a la estructura de datos definida; de lo contrario puedes encontrar errores no controlados_


    **Consulta los esquemas de cada solicitud para encontrar los valores permitidos de ciertas propiedades.**


    _Limitaciones técnicas: La actualización y eliminación del conocimiento y las relaciones de los personajes no están disponibles a través de la API. Deben gestionarse desde el frontend de nuestra aplicación._


    Algunos enlaces útiles:

    - [Nuestro sitio web](https://npcbuilder.com)

    - [La app](https://app.npcbuilder.com)
    
  termsOfService: https://npcbuilder.com/terms-and-conditions/
  contact:
    email: support@npcbuilder.com
  version: 1.6.0
servers:
  - url: https://app.npcbuilder.com/api
    description: API de producción para contexto, sesiones y endpoints que no son de interacciones
tags:
  - name: Interactions
    description: Gestiona las conversaciones de texto de tus NPCs y sus respuestas interactivas.
  - name: Characters
    description: Gestiona personajes de tu juego, incluyendo creación, actualización y eliminación.
  - name: Worlds
    description: Crea y gestiona mundos inmersivos para tu juego.
  - name: Regions
    description: Define y gestiona regiones dentro de tus mundos.
  - name: Locations
    description: Gestiona ubicaciones específicas dentro de las regiones de tu juego.
  - name: Sessions
    description: Crea, recupera y elimina sesiones de jugadores para una mejor gestión del juego.
paths:
  /interactions:
    post:
      tags:
        - Interactions
      summary: Obtener una respuesta de un personaje NPC
      description: >
        Envía un array de mensajes de interacción entre el jugador y el personaje NPC.
        La API procesa el historial de conversación y devuelve una nueva respuesta generada por el personaje.
        
        **Modos de respuesta**

        - **HTTP batch (por defecto):** Envía una petición `POST https://api.app.npcbuilder.com/api/interactions`. El servicio compone toda la respuesta y entrega un JSON con `response`, `user_events` y `character_events`.

        - **Streaming por WebSocket:** Abre una conexión WebSocket a `wss://api.app.npcbuilder.com/api/interactions`. Una vez aceptada, envía:

          ```json
          {
            "type": "interaction.start",
            "payload": { ...interacción... },
            "meta": {
              "language": "es-ES",
              "session_id": "opcional"
            }
          }
          ```

          El servidor emite los eventos `stream.accepted`, varios `stream.delta`, opcionalmente `stream.safe_response` cuando se detecta una frase vetada y, al finalizar, `stream.end` con el texto completo, los eventos y los tokens consumidos.  

          Envía `{"type":"interaction.cancel"}` para abortar una generación.

        **Complemento de voz (solo WebSocket)**

        - Conecta a `wss://api.app.npcbuilder.com/api/interactions?voice=true` para voz bidireccional, o usa `voice=input` / `voice=output` para voz en un solo sentido. También puedes proporcionar `meta.voice` dentro de `interaction.start`.
        - Con voz habilitada se mantienen los eventos `stream.*` de texto y además se envían eventos `voice.*`:
          - `voice.ready`, `voice.session.updated` — estado de la sesión de Azure Voice Live.
          - `voice.audio.delta`, `voice.audio.timestamp`, `voice.audio.done`, `voice.response.done` — audio generado por el asistente.
          - `voice.transcript.delta`, `voice.input.started/stopped`, `voice.usage` — audio del micrófono transcrito por el servicio.
        - Comandos aceptados mientras la sesión está activa:

          ```json
          { "type": "voice.input.append", "data": { "audio": "<chunk pcm16 base64>" } }
          { "type": "voice.input.commit" }
          { "type": "voice.input.clear" }
          { "type": "voice.session.update", "data": { "voice_name": "en-US-Ava:DragonHDLatestNeural" } }
          { "type": "voice.cancel" }
          ```

        El streaming de texto nunca se desactiva: siempre recibirás `stream.delta` y el `stream.end` final, incluso cuando la reproducción de voz está activa.
      operationId: addInteraction
      servers:
        - url: https://api.app.npcbuilder.com/api
          description: API HTTP de producción para interacciones batch
        - url: wss://api.app.npcbuilder.com/api
          description: API WebSocket de producción para interacciones con streaming de texto y voz
      x-websocket:
        textStreamingUrl: wss://api.app.npcbuilder.com/api/interactions
        voiceStreamingUrl: wss://api.app.npcbuilder.com/api/interactions?voice=true
        voiceModes:
          - "true"
          - input
          - output
        clientMessages:
          - interaction.start
          - interaction.cancel
          - voice.input.append
          - voice.input.commit
          - voice.input.clear
          - voice.session.update
          - voice.cancel
        serverEvents:
          - stream.accepted
          - stream.delta
          - stream.safe_response
          - stream.end
          - stream.error
          - voice.ready
          - voice.session.updated
          - voice.audio.delta
          - voice.audio.timestamp
          - voice.audio.done
          - voice.response.done
          - voice.transcript.delta
          - voice.input.started
          - voice.input.stopped
          - voice.usage
      parameters:
        - name: language
          in: query
          description: >
            El código de idioma para la interacción. Valores admitidos:
            - **en-US**: Inglés (Estados Unidos)
            - **es-ES**: Español (España)
          required: true
          schema:
            type: string
            enum:
              - en-US
              - es-ES
            example: en-US
        - name: session_id
          in: query
          description: (Opcional) El identificador único de la sesión del jugador.
          required: false
          schema:
            type: string
            example: "60Z5aZjIuFlyYbjbZZKe"
        - name: voice
          in: query
          description: >
            Opcional. Controla el complemento de Azure Voice Live cuando se usa WebSocket. Valores aceptados:

            * `false` (predeterminado): desactiva la voz.
            * `true`: habilita audio bidireccional (STT + TTS).
            * `input`: solo captura voz del usuario (STT).
            * `output`: solo sintetiza el audio del asistente (TTS).
          required: false
          schema:
            type: string
            enum:
              - "false"
              - "true"
              - input
              - output
            default: "false"
      requestBody:
        description: >
          Una carga útil en JSON, XML o codificada en URL que contiene el historial completo de la conversación. 
          Asegúrate de enviar los mensajes como un array de objetos siguiendo el esquema definido.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Interaction'
          application/xml:
            schema:
              $ref: '#/components/schemas/Interaction'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Interaction'
        required: true
      responses:
        '200':
          description: >
            Operación exitosa. Devuelve la respuesta del personaje junto con cualquier evento de usuario desencadenado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '206':
          description: >
            Contenido parcial por alcanzar la longitud máxima. La respuesta puede estar truncada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaxLength'
            application/xml:
              schema:
                $ref: '#/components/schemas/MaxLength'
        '401':
          description: No autorizado – No se proporcionó un token válido.
          content:
            application/json:
              example: "No autorizado, no se proporcionó token"
        '403':
          description: Prohibido – Se proporcionó un token inválido. Intenta generar un token nuevo.
          content:
            application/json:
              example: "No autorizado, token inválido. Intenta generar un token nuevo."
        '409':
          description: >
            Conflicto – Operación no permitida debido a límites de uso, objetos inexistentes o funciones no implementadas.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorNoContext'
                  - $ref: '#/components/schemas/ErrorUsageLimit'
                  - $ref: '#/components/schemas/ErrorNotImplemented'
        '500':
          description: >
            Error interno del servidor – Ocurrió un error al procesar la interacción.
          content:
            application/json:
              example: "Error al crear la interacción"
      security:
        - npcbuilder_auth: []
  /conversations:
    get:
      tags:
        - Interactions
      summary: Listar conversaciones
      description: Recupera una lista de conversaciones, opcionalmente filtrada por ID de sesión, ID de personaje o ID de jugador.
      parameters:
        - name: session_id
          in: query
          description: ID de sesión opcional para filtrar conversaciones.
          required: false
          schema:
            type: string
        - name: character_id
          in: query
          description: ID de personaje opcional para filtrar conversaciones.
          required: false
          schema:
            type: string
        - name: player_id
          in: query
          description: ID de jugador opcional para filtrar conversaciones.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de conversaciones recuperada con éxito.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conversation'
        '401':
          description: No autorizado.
      security:
        - npcbuilder_auth: []
    post:
      tags:
        - Interactions
      summary: Crear una nueva conversación
      description: Crea explícitamente una nueva conversación para un personaje y jugador.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - character_id
                - game_id
              properties:
                character_id:
                  type: string
                game_id:
                  type: string
                session_id:
                  type: string
                metadata:
                  type: object
      responses:
        '201':
          description: Conversación creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
      security:
        - npcbuilder_auth: []
  /conversations/{id}:
    get:
      tags:
        - Interactions
      summary: Obtener historial de conversación
      description: Recupera el historial completo de mensajes para una conversación específica.
      parameters:
        - name: id
          in: path
          required: true
          description: El ID único de la conversación.
          schema:
            type: string
      responses:
        '200':
          description: Historial de conversación recuperado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Messages'
        '404':
          description: Conversación no encontrada.
      security:
        - npcbuilder_auth: []
  /context/characters/{game_id}/{world_id}/{character_id}:
    get:
      summary: Obtener detalles del personaje
      tags:
        - Characters
      description: >
        Recupera los detalles públicos de un personaje. Se omiten campos internos
        como conocimiento, relaciones, filtros, memoria y modelo.
      parameters:
        - name: game_id
          in: path
          required: true
          description: El identificador único del juego.
          schema:
            type: string
            example: "game123"
        - name: world_id
          in: path
          required: true
          description: El identificador único del mundo.
          schema:
            type: string
            example: "world456"
        - name: character_id
          in: path
          required: true
          description: El identificador único del personaje.
          schema:
            type: string
            example: "character789"
        - name: session_id
          in: query
          description: (Opcional) El ID de sesión del jugador.
          required: false
          schema:
            type: string
            example: "60Z5aZjIuFlyYbjbZZKe"
      responses:
        '200':
          description: Personaje recuperado correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  character_id:
                    type: string
                    description: UID del personaje.
                    example: "character789"
                  character:
                    $ref: '#/components/schemas/PublicCharacter'
        '400':
          description: >
            Error de validación - Los parámetros de la solicitud no coinciden con el esquema requerido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No encontrado - El personaje especificado no existe.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Mensaje de error para el personaje no encontrado.
                    example: "Personaje con ID character789 no encontrado."
        '500':
          description: >
            Error interno del servidor - Ocurrió un error al recuperar el personaje.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - npcbuilder_auth: []
    post:
      summary: Crear un nuevo personaje
      tags:
        - Characters
      description: >
        Crea un nuevo personaje dentro del juego y mundo especificados.
        Proporciona detalles como edad, descripción, género, objetos, eventos, misiones, rol, tono y rasgos.
      parameters:
        - name: game_id
          in: path
          required: true
          description: El identificador único del juego.
          schema:
            type: string
            example: "game123"
        - name: world_id
          in: path
          required: true
          description: El identificador único del mundo.
          schema:
            type: string
            example: "world456"
        - name: character_id
          in: path
          required: true
          description: El identificador único del personaje.
          schema:
            type: string
            example: "character789"
        - name: session_id
          in: query
          description: (Opcional) El ID de sesión del jugador.
          required: false
          schema:
            type: string
            example: "60Z5aZjIuFlyYbjbZZKe"
      requestBody:
        required: true
        description: Los datos necesarios del personaje para crearlo.
        content:
          application/json:
            schema:
              type: object
              properties:
                age:
                  type: string
                  description: La categoría de edad del personaje.
                  enum:
                    - infant
                    - child
                    - teenager
                    - youngAdult
                    - adult
                    - middleAged
                    - elderly
                  example: "adult"
                description:
                  type: string
                  description: Una breve descripción de los antecedentes del personaje.
                  example: "Un valiente guerrero con un pasado misterioso."
                gender:
                  type: string
                  description: El género del personaje.
                  example: "Male"
                model:
                  type: string
                  description: El modelo de IA usado para las interacciones del personaje. Los modelos premium solo están disponibles para algunas suscripciones.
                  enum: 
                    - standard
                    - premium
                  example: "standard"
                filters:
                  type: object
                  description: >
                    Filtros de contenido estructurados aplicados a las respuestas del personaje.
                    Activa o desactiva las categorías individuales para controlar lo que puede decir.
                  properties:
                    active:
                      type: boolean
                      description: Activa o desactiva todos los filtros del personaje.
                    violence:
                      type: boolean
                      description: Refuerza contenido violento o sangriento en las respuestas del personaje.
                    sexual:
                      type: boolean
                      description: Refuerza contenido sexual o sugestivo en las respuestas del personaje.
                    drugs:
                      type: boolean
                      description: Refuerza referencias al consumo de drogas o parafernalia en las respuestas del personaje.
                  required:
                    - active
                    - violence
                    - sexual
                    - drugs
                  example:
                    active: true
                    violence: false
                    sexual: false
                    drugs: true
                items:
                  type: array
                  description: >
                    Lista de objetos asociados al personaje.
                    Cada objeto debe seguir uno de los esquemas predefinidos según su tipo.
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: El tipo de objeto, que determina su esquema.
                        enum:
                          - trade
                          - action
                        example: "trade"
                    required:
                      - type
                    oneOf:
                      - description: Esquema para objetos de tipo "trade"
                        properties:
                          type:
                            type: string
                            enum:
                              - trade
                            example: "trade"
                          itemName:
                            type: string
                            description: El nombre del objeto de intercambio.
                            example: "Sword"
                          description:
                            type: string
                            description: Una descripción detallada del objeto.
                            example: "Una espada afilada."
                          unit:
                            type: string
                            description: La unidad en la que se mide el objeto.
                            example: "Pieza"
                          value:
                            type: string
                            description: El valor o coste del objeto.
                            example: "100"
                        required:
                          - itemName
                          - unit
                          - value
                      - description: Esquema para objetos de tipo "action"
                        properties:
                          type:
                            type: string
                            enum:
                              - action
                            example: "action"
                          itemName:
                            type: string
                            description: El nombre del objeto de acción.
                            example: "Move"
                          description:
                            type: string
                            description: Una descripción de la acción.
                            example: "Mover a una posición"
                        required:
                          - itemName
                          - description
                events:
                  type: array
                  description: >
                    Lista de eventos asociados al personaje.
                    Cada evento debe ajustarse al esquema definido para su tipo.
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: El tipo de evento.
                        enum:
                          - item
                          - action
                        example: "item"
                    required:
                      - type
                    oneOf:
                      - description: Esquema para eventos de tipo "action"
                        properties:
                          type:
                            type: string
                            enum:
                              - action
                            example: "action"
                          eventName:
                            type: string
                            description: El nombre del evento.
                            example: "Attack"
                          description:
                            type: string
                            description: Detalles del evento.
                            example: "Acto de violencia contra otra persona."
                        required:
                          - eventName
                      - description: Esquema para eventos de tipo "item"
                        properties:
                          type:
                            type: string
                            enum:
                              - item
                            example: "item"
                          eventName:
                            type: string
                            description: El nombre del evento.
                            example: "Give"
                          description:
                            type: string
                            description: Detalles del evento.
                            example: "Proporcionar un objeto a una persona."
                        required:
                          - eventName
                name:
                  type: string
                  description: El nombre visible del personaje.
                  example: "Aragorn"
                quests:
                  type: array
                  description: Una lista de misiones asociadas al personaje.
                  items:
                    type: object
                    properties:
                      description:
                        type: string
                        description: Breve descripción de la misión.
                        example: "Recupera el artefacto perdido."
                      objective:
                        type: string
                        description: El objetivo principal de la misión.
                        example: "Encontrar y devolver el artefacto."
                      reward:
                        type: string
                        description: La recompensa por completar la misión.
                        example: "500 monedas de oro"
                role:
                  type: string
                  description: >
                    El rol del personaje en el juego. Determina cómo interactúa con la historia.
                  enum:
                    - noRole
                    - protagonist
                    - antagonist
                    - secondaryCharacter
                    - tertiaryCharacter
                    - mentor
                    - enemy
                    - villain
                    - rival
                    - shopkeeper
                    - healer
                    - questGiver
                    - innkeeper
                    - guard
                    - familyMember
                    - loveInterest
                    - scientist
                    - politician
                    - criminal
                    - explorer
                    - wizard
                    - ghost
                    - animalCompanion
                    - artificialIntelligence
                  example: "protagonist"
                tone:
                  type: string
                  description: El tono o estilo del diálogo del personaje.
                  enum:
                    - formal
                    - casual
                    - sarcastic
                    - mysterious
                    - emotive
                  example: "mysterious"
                traits:
                  type: array
                  description: Lista de rasgos de personalidad que describen al personaje.
                  items:
                    type: string
                    example: "brave"
      responses:
        '200':
          description: Personaje creado correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Mensaje de confirmación con detalles del personaje.
                    example: "Personaje: character789 ha sido creado con el siguiente contexto."
                  character_id:
                    type: string
                    description: UID del personaje.
                    example: "character789"
                  character_context:
                    type: object
                    description: El contexto del personaje creado.
                    example:
                      age: "adult"
                      description: "Un valiente guerrero con un pasado misterioso."
                      gender: "Male"
                      items:
                        - itemName: "Sword"
                          unit: "Pieza"
                          value: "100"
                      name: "Aragorn"
                      quests:
                        - description: "Recupera el artefacto perdido."
                          objective: "Encontrar y devolver el artefacto."
                          reward: "500 monedas de oro"
                      role: "protagonist"
                      tone: "mysterious"
                      traits: ["brave"]
        '400':
          description: >
            Error de validación – La carga útil de la solicitud no coincide con el esquema requerido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: >
            No encontrado – No se encontró el contexto del juego, mundo o personaje especificado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Mensaje de error con posibles razones.
                    example: |
                      Posibles razones:
                      - Personaje no encontrado
        '500':
          description: >
            Error interno del servidor – Ocurrió un error al crear el personaje.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - npcbuilder_auth: []
    patch:
      summary: Actualizar detalles del personaje
      tags:
        - Characters
      description: >
        Actualiza los detalles de un personaje existente.
        Proporciona cualquiera de los campos actualizables como edad, descripción, género, objetos, eventos, misiones, rol, tono o rasgos.
      parameters:
        - name: game_id
          in: path
          required: true
          description: El identificador único del juego.
          schema:
            type: string
            example: "game123"
        - name: world_id
          in: path
          required: true
          description: El identificador único del mundo.
          schema:
            type: string
            example: "world456"
        - name: character_id
          in: path
          required: true
          description: El identificador único del personaje.
          schema:
            type: string
            example: "character789"
        - name: session_id
          in: query
          description: (Opcional) El ID de sesión del jugador.
          required: false
          schema:
            type: string
            example: "60Z5aZjIuFlyYbjbZZKe"
      requestBody:
        required: true
        description: Los campos de datos del personaje a actualizar.
        content:
          application/json:
            schema:
              type: object
              properties:
                age:
                  type: string
                  description: La categoría de edad del personaje.
                  enum:
                    - infant
                    - child
                    - teenager
                    - youngAdult
                    - adult
                    - middleAged
                    - elderly
                  example: "adult"
                description:
                  type: string
                  description: Una breve descripción del personaje.
                  example: "Un valiente guerrero con un pasado misterioso."
                gender:
                  type: string
                  description: El género del personaje.
                  example: "Male"
                model:
                  type: string
                  description: El modelo de IA usado para las interacciones del personaje. Los modelos premium solo están disponibles para algunas suscripciones.
                  enum: 
                    - standard
                    - premium
                  example: "standard"
                filters:
                  type: object
                  description: >
                    Filtros de contenido estructurados aplicados a las respuestas del personaje.
                    Indica los valores que deseas actualizar al ajustar la configuración de moderación.
                  properties:
                    active:
                      type: boolean
                      description: Activa o desactiva todos los filtros del personaje.
                    violence:
                      type: boolean
                      description: Refuerza contenido violento o sangriento en las respuestas del personaje.
                    sexual:
                      type: boolean
                      description: Refuerza contenido sexual o sugestivo en las respuestas del personaje.
                    drugs:
                      type: boolean
                      description: Refuerza referencias al consumo de drogas o parafernalia en las respuestas del personaje.
                  example:
                    active: true
                    violence: true
                    sexual: false
                    drugs: false
                items:
                  type: array
                  description: Lista actualizada de objetos del personaje.
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: El tipo de objeto.
                        enum:
                          - trade
                          - action
                        example: "trade"
                    required:
                      - type
                    oneOf:
                      - description: Esquema para objetos de tipo "trade"
                        properties:
                          type:
                            type: string
                            enum:
                              - trade
                            example: "trade"
                          itemName:
                            type: string
                            description: El nombre del objeto de intercambio.
                            example: "Sword"
                          description:
                            type: string
                            description: Una descripción detallada del objeto.
                            example: "Una espada afilada."
                          unit:
                            type: string
                            description: La unidad de medida.
                            example: "Pieza"
                          value:
                            type: string
                            description: El coste o valor del objeto.
                            example: "100"
                        required:
                          - itemName
                          - unit
                          - value
                      - description: Esquema para objetos de tipo "action"
                        properties:
                          type:
                            type: string
                            enum:
                              - action
                            example: "action"
                          itemName:
                            type: string
                            description: El nombre de la acción.
                            example: "Move"
                          description:
                            type: string
                            description: Una descripción de la acción.
                            example: "Mover a una posición"
                        required:
                          - itemName
                          - description
                events:
                  type: array
                  description: Lista de eventos relacionados con el personaje.
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: El tipo de evento.
                        enum:
                          - item
                          - action
                        example: "item"
                    required:
                      - type
                    oneOf:
                      - description: Esquema para eventos de tipo "action"
                        properties:
                          type:
                            type: string
                            enum:
                              - action
                            example: "action"
                          eventName:
                            type: string
                            description: El nombre del evento.
                            example: "Attack"
                          description:
                            type: string
                            description: Descripción detallada del evento.
                            example: "Acto de violencia contra otra persona."
                        required:
                          - eventName
                      - description: Esquema para eventos de tipo "item"
                        properties:
                          type:
                            type: string
                            enum:
                              - item
                            example: "item"
                          eventName:
                            type: string
                            description: El nombre del evento.
                            example: "Give"
                          description:
                            type: string
                            description: Descripción detallada del evento.
                            example: "Entregar un objeto a una persona."
                        required:
                          - eventName
                name:
                  type: string
                  description: El nombre visible del personaje.
                  example: "Aragorn"
                quests:
                  type: array
                  description: Una lista de misiones asociadas al personaje.
                  items:
                    type: object
                    properties:
                      description:
                        type: string
                        description: Breve descripción de la misión.
                        example: "Recupera el artefacto perdido."
                      objective:
                        type: string
                        description: El objetivo principal de la misión.
                        example: "Encontrar y devolver el artefacto."
                      reward:
                        type: string
                        description: La recompensa por completar la misión.
                        example: "500 monedas de oro"
                role:
                  type: string
                  description: El rol que desempeña el personaje en el juego.
                  enum:
                    - noRole
                    - protagonist
                    - antagonist
                    - secondaryCharacter
                    - tertiaryCharacter
                    - mentor
                    - enemy
                    - villain
                    - rival
                    - shopkeeper
                    - healer
                    - questGiver
                    - innkeeper
                    - guard
                    - familyMember
                    - loveInterest
                    - scientist
                    - politician
                    - criminal
                    - explorer
                    - wizard
                    - ghost
                    - animalCompanion
                    - artificialIntelligence
                  example: "protagonist"
                tone:
                  type: string
                  description: El estilo o estado de ánimo del diálogo del personaje.
                  enum:
                    - formal
                    - casual
                    - sarcastic
                    - mysterious
                    - emotive
                  example: "mysterious"
                traits:
                  type: array
                  description: Lista de rasgos de personalidad del personaje.
                  items:
                    type: string
                    example: "brave"
      responses:
        '200':
          description: Personaje actualizado correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Mensaje de confirmación tras actualizar el personaje.
                    example: "Personaje: character789 ha sido actualizado con el siguiente contexto."
                  character_id:
                    type: string
                    description: UID del personaje.
                    example: "character789"
                  character_context:
                    type: object
                    description: Datos del contexto del personaje actualizados.
                    example:
                      age: "adult"
                      description: "Un valiente guerrero con un pasado misterioso."
                      gender: "Male"
                      items:
                        - itemName: "Sword"
                          unit: "Pieza"
                          value: "100"
                      name: "Aragorn"
                      quests:
                        - description: "Recupera el artefacto perdido."
                          objective: "Encontrar y devolver el artefacto."
                          reward: "500 monedas de oro"
                      role: "protagonist"
                      tone: "mysterious"
                      traits: ["brave"]
        '400':
          description: >
